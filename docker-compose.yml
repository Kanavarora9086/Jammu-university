services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/university_portal
      - JWT_ACCESS_SECRET=change_me_access_secret_please_change
      - JWT_ACCESS_EXPIRES_IN=15m
      - JWT_REFRESH_SECRET=change_me_refresh_secret_please_change
      - JWT_REFRESH_EXPIRES_IN=30d
      - FRONTEND_ORIGIN=http://localhost:5173
      - UPLOAD_DIR=uploads
    ports:
      - "5000:5000"
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE=http://localhost:5000
    environment:
      - VITE_API_BASE=http://localhost:5000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongo_data:

